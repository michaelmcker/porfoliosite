name: Refresh Cool Runnings metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "23 14 * * *"

permissions:
  contents: write
  id-token: write

concurrency:
  group: cool-runnings-metrics
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google with short-lived credentials
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Refresh verified 28-day metrics
        env:
          GSC_SITE_URL: sc-domain:coolrunningslandscaping.com
          GA4_PROPERTY_ID: properties/527841655
          GSC_DATA_LAG_DAYS: "3"
          DATAFORSEO_TARGET: coolrunningslandscaping.com
          DATAFORSEO_LOCATION_NAME: Canada
          DATAFORSEO_LANGUAGE_NAME: English
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
        run: node scripts/refresh-cool-runnings-metrics.mjs

      - name: Commit changed snapshot
        id: commit
        run: |
          if git diff --quiet -- data/cool-runnings-metrics-current.json; then
            echo "Metrics are unchanged."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cool-runnings-metrics-current.json
          git commit -m "chore: refresh Cool Runnings metrics"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Verify production received the snapshot
        if: steps.commit.outputs.changed == 'true'
        run: |
          node --input-type=module -e '
            import { readFile } from "node:fs/promises";
            const expected = JSON.parse(await readFile("data/cool-runnings-metrics-current.json", "utf8")).generatedAt;
            const url = "https://michaelmck.site/data/cool-runnings-metrics-current.json";
            for (let attempt = 1; attempt <= 20; attempt += 1) {
              const response = await fetch(url, { cache: "no-store" }).catch(() => null);
              const live = response?.ok ? await response.json().catch(() => null) : null;
              if (live?.generatedAt === expected && live?.update?.state === "verified") {
                console.log(`Production verified at ${expected}`);
                process.exit(0);
              }
              console.log(`Waiting for production deployment (${attempt}/20)`);
              await new Promise((resolve) => setTimeout(resolve, 15000));
            }
            throw new Error(`Production did not serve snapshot ${expected} within five minutes`);
          '
